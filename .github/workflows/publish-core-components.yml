name: Publish @mrsimpson/homelab-core-components

on:
  push:
    branches: [main]
    paths:
      - 'packages/core/components/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci
        working-directory: packages/core/components

      - name: Build
        run: npm run build
        working-directory: packages/core/components

      - name: Publish
        run: npm publish
        working-directory: packages/core/components
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
